<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>前额叶状态投票</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 400px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 32px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .brain-icon {
    font-size: 56px;
    margin-bottom: 12px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    line-height: 1.4;
  }

  .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-top: 8px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    position: relative;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    overflow: hidden;
  }

  .option:active { transform: scale(0.98); }

  .option.selected {
    border-color: #a78bfa;
    background: rgba(167,139,250,0.15);
    box-shadow: 0 0 20px rgba(167,139,250,0.2);
  }

  .option-inner {
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 1;
  }

  .letter {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    flex-shrink: 0;
    transition: all 0.3s ease;
  }

  .option.selected .letter {
    background: #a78bfa;
    color: #fff;
  }

  .label {
    font-size: 15px;
    color: rgba(255,255,255,0.85);
    line-height: 1.5;
    font-weight: 500;
  }

  .vote-btn {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    opacity: 0.5;
    pointer-events: none;
  }

  .vote-btn.active {
    opacity: 1;
    pointer-events: auto;
    box-shadow: 0 8px 30px rgba(124,58,237,0.4);
  }

  .vote-btn.active:active { transform: scale(0.97); }

  /* Results */
  .results { display: none; margin-top: 20px; }

  .result-bar {
    margin-bottom: 14px;
  }

  .result-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 6px;
  }

  .result-track {
    height: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 5px;
    overflow: hidden;
  }

  .result-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  .result-fill.a { background: linear-gradient(90deg, #f97316, #fb923c); }
  .result-fill.b { background: linear-gradient(90deg, #facc15, #fde047); }
  .result-fill.c { background: linear-gradient(90deg, #34d399, #6ee7b7); }
  .result-fill.d { background: linear-gradient(90deg, #818cf8, #a78bfa); }

  .total-votes {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 16px;
  }

  .voted-tag {
    display: none;
    text-align: center;
    font-size: 13px;
    color: #a78bfa;
    margin-top: 12px;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="brain-icon">🧠</div>
    <div class="title">你的前额叶<br>现在处于哪种状态？</div>
    <div class="subtitle">诚实面对自己，投票后查看结果</div>
  </div>

  <div class="options" id="options">
    <div class="option" data-id="A" onclick="select('A')">
      <div class="option-inner">
        <div class="letter">A</div>
        <div class="label">长期报废型——靠肌肉记忆活着</div>
      </div>
    </div>
    <div class="option" data-id="B" onclick="select('B')">
      <div class="option-inner">
        <div class="letter">B</div>
        <div class="label">间歇罢工型——时好时坏，看天气</div>
      </div>
    </div>
    <div class="option" data-id="C" onclick="select('C')">
      <div class="option-inner">
        <div class="letter">C</div>
        <div class="label">正在康复型——感谢南审，稳步回升中</div>
      </div>
    </div>
    <div class="option" data-id="D" onclick="select('D')">
      <div class="option-inner">
        <div class="letter">D</div>
        <div class="label">天生优越型——什么是前额叶？没罢工过</div>
      </div>
    </div>
  </div>

  <button class="vote-btn" id="voteBtn" onclick="submitVote()">投 票</button>
  <div class="voted-tag" id="votedTag">✓ 投票成功</div>

  <div class="results" id="results">
    <div class="result-bar" id="barA">
      <div class="result-label"><span>A · 长期报废型</span><span class="pct">0%</span></div>
      <div class="result-track"><div class="result-fill a" style="width:0%"></div></div>
    </div>
    <div class="result-bar" id="barB">
      <div class="result-label"><span>B · 间歇罢工型</span><span class="pct">0%</span></div>
      <div class="result-track"><div class="result-fill b" style="width:0%"></div></div>
    </div>
    <div class="result-bar" id="barC">
      <div class="result-label"><span>C · 正在康复型</span><span class="pct">0%</span></div>
      <div class="result-track"><div class="result-fill c" style="width:0%"></div></div>
    </div>
    <div class="result-bar" id="barD">
      <div class="result-label"><span>D · 天生优越型</span><span class="pct">0%</span></div>
      <div class="result-track"><div class="result-fill d" style="width:0%"></div></div>
    </div>
    <div class="total-votes" id="totalVotes"></div>
  </div>
</div>

<script>
  let selected = null;
  let hasVoted = false;

  // Simulated votes (in production, replace with backend API)
  const votes = { A: 0, B: 0, C: 0, D: 0 };

  function select(id) {
    if (hasVoted) return;
    selected = id;
    document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
    document.querySelector(`[data-id="${id}"]`).classList.add('selected');
    document.getElementById('voteBtn').classList.add('active');
  }

  function submitVote() {
    if (!selected || hasVoted) return;
    hasVoted = true;
    votes[selected]++;

    // Use localStorage as simple persistence
    const stored = JSON.parse(localStorage.getItem('prefrontal_votes') || '{"A":0,"B":0,"C":0,"D":0}');
    stored[selected]++;
    localStorage.setItem('prefrontal_votes', JSON.stringify(stored));

    showResults(stored);
    document.getElementById('votedTag').style.display = 'block';
    document.getElementById('voteBtn').style.display = 'none';
    document.querySelectorAll('.option').forEach(el => el.style.pointerEvents = 'none');
  }

  function showResults(v) {
    const total = v.A + v.B + v.C + v.D;
    if (total === 0) return;

    document.getElementById('results').style.display = 'block';
    ['A','B','C','D'].forEach(letter => {
      const pct = Math.round(v[letter] / total * 100);
      const bar = document.getElementById('bar' + letter);
      bar.querySelector('.pct').textContent = pct + '%';
      bar.querySelector('.result-fill').style.width = pct + '%';
    });
    document.getElementById('totalVotes').textContent = `共 ${total} 人参与投票`;
  }

  // Load previous results on init
  (function init() {
    const stored = JSON.parse(localStorage.getItem('prefrontal_votes') || '{"A":0,"B":0,"C":0,"D":0}');
    const total = stored.A + stored.B + stored.C + stored.D;
    if (total > 0) {
      hasVoted = true;
      showResults(stored);
      document.getElementById('votedTag').style.display = 'block';
      document.getElementById('voteBtn').style.display = 'none';
      document.querySelectorAll('.option').forEach(el => el.style.pointerEvents = 'none');
    }
  })();
</script>

</body>
</html>
