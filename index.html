<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>长白山林下经济非标生物资产金融化平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#0a1628 0%,#0f2440 50%,#0a1e35 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#e0e8f0}
.container{text-align:center;max-width:800px;padding:40px}
h1{font-size:28px;font-weight:700;margin-bottom:8px;background:linear-gradient(90deg,#5bc0eb,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#8899aa;font-size:14px;margin-bottom:48px}
.cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:32px 28px;width:220px;cursor:pointer;transition:all .25s;text-decoration:none;color:inherit}
.card:hover{background:rgba(255,255,255,0.08);border-color:rgba(91,192,235,0.4);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
.card-icon{font-size:36px;margin-bottom:16px}
.card-title{font-size:17px;font-weight:600;margin-bottom:8px;color:#e0e8f0}
.card-desc{font-size:12px;color:#6b828e;line-height:1.6}
.card-role{display:inline-block;margin-top:14px;padding:4px 12px;border-radius:3px;font-size:11px;background:rgba(58,123,213,0.2);color:#5bc0eb}
.footer{margin-top:48px;font-size:11px;color:#4a5e6e}
.footer a{color:#5b7b8e}
</style>
</head>
<body>
<div class="container">
  <h1>长白山林下经济非标生物资产金融化平台</h1>
  <p class="sub">IoT + AI价值参考 + 区块链存证 · 林下生物资产金融化解决方案</p>
  <div class="cards">
    <a class="card" href="林企参农-工作台.html">
      <div class="card-icon">🏔️</div>
      <div class="card-title">资产持有方工作台</div>
      <div class="card-desc">资产上链、传感器管理、融资申请</div>
      <span class="card-role">林企/种植户</span>
    </a>
    <a class="card" href="银行-工作台.html">
      <div class="card-icon">🏦</div>
      <div class="card-title">银行工作台</div>
      <div class="card-desc">贷款审查、LTV监控、区块链存证查验</div>
      <span class="card-role">信贷审批方</span>
    </a>
    <a class="card" href="评估师-工作台.html">
      <div class="card-icon">📊</div>
      <div class="card-title">评估师工作台</div>
      <div class="card-desc">AI价值参考核查、底稿生成、电子签章</div>
      <span class="card-role">独立第三方估值</span>
    </a>
    <a class="card" href="担保保险-工作台.html">
      <div class="card-icon">🛡️</div>
      <div class="card-title">担保/保险工作台</div>
      <div class="card-desc">协同审查、LTV风险监控、理赔前置</div>
      <span class="card-role">增信与风险分担</span>
    </a>
    <a class="card" href="政府监管-工作台.html">
      <div class="card-icon">🏛️</div>
      <div class="card-title">政府监管工作台</div>
      <div class="card-desc">产业数据大盘、信贷监测、补偿金监管</div>
      <span class="card-role">产业监管与政策</span>
    </a>
  </div>
  <p class="footer">v1.0 内测 · 挑战杯 Demo · <a href="https://github.com">GitHub</a></p>
</div>
</body>
</html>
