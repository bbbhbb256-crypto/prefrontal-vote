<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资产持有方工作台 — 长白山金融化平台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#f0f2f5; --bg-white:#fff; --bg-hover:#f7f8fa; --bg-active:#e8f0fe;
  --primary:#1a6fff; --primary-light:#e8f0fe; --primary-dark:#1557cc;
  --success:#00a870; --warn:#ed7b2f; --danger:#e34d59;
  --text:#1f2937; --text-secondary:#6b7280; --text-muted:#9ca3af;
  --border:#e5e7eb; --border-light:#f0f1f3;
  --font:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;
  --radius:4px; --shadow:0 1px 3px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden;width:100vw;height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
a{color:var(--primary);text-decoration:none}

/* ===== TOP NAV ===== */
#topnav{
  height:48px;background:var(--bg-white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:0;box-shadow:var(--shadow);
  position:relative;z-index:100;
}
#topnav .sys-name{font-size:15px;font-weight:600;color:var(--text);margin-right:24px;white-space:nowrap}
#topnav .sys-name .ver{font-size:11px;color:var(--text-muted);font-weight:400;margin-left:6px}
#topnav .tn-item{
  padding:0 16px;height:48px;line-height:48px;font-size:13px;color:var(--text-secondary);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;
}
#topnav .tn-item:hover{color:var(--text)}
#topnav .tn-item.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500}
#topnav .tn-right{margin-left:auto;display:flex;align-items:center;gap:16px}
#topnav .tn-badge{
  position:relative;cursor:pointer;padding:4px 8px;border-radius:var(--radius);font-size:12px;color:var(--text-secondary);
}
#topnav .tn-badge:hover{background:var(--bg-hover)}
#topnav .tn-badge .dot{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;background:var(--danger)}
#topnav .tn-user{font-size:13px;color:var(--text);cursor:pointer;padding:4px 8px;border-radius:var(--radius)}
#topnav .tn-user:hover{background:var(--bg-hover)}

/* ===== LAYOUT ===== */
#layout{display:flex;height:calc(100vh - 48px)}
#sidebar{
  width:200px;background:var(--bg-white);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:8px 0;flex-shrink:0;overflow-y:auto;
}
.sm-group{padding:4px 0}
.sm-group-title{padding:8px 20px 4px;font-size:11px;color:var(--text-muted);font-weight:500;text-transform:uppercase}
.sm-item{
  display:flex;align-items:center;gap:10px;padding:9px 20px;margin:1px 8px;
  border-radius:var(--radius);cursor:pointer;color:var(--text-secondary);font-size:13px;
  transition:all .12s;white-space:nowrap;
}
.sm-item:hover{background:var(--bg-hover);color:var(--text)}
.sm-item.active{background:var(--primary-light);color:var(--primary);font-weight:500}
.sm-item .sm-ico{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:13px;color:inherit}
.sm-item .sm-badge{margin-left:auto;font-size:11px;background:var(--danger);color:#fff;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}

#main{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px}

/* ===== PAGE HEADER ===== */
.page-hdr{display:flex;align-items:center;justify-content:space-between}
.page-hdr h2{font-size:18px;font-weight:600;color:var(--text)}
.breadcrumb{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.breadcrumb span{color:var(--text-secondary)}

/* ===== CARDS & PANELS ===== */
.card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:14px}
.card-body{padding:16px}
.card-body.nopad{padding:0}

/* ===== STATS ROW ===== */
.stats-row{display:flex;gap:12px}
.stat-card{flex:1;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.stat-card .st-label{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.stat-card .st-val{font-size:24px;font-weight:700;color:var(--text)}
.stat-card .st-sub{font-size:11px;color:var(--text-secondary);margin-top:4px}
.stat-card .st-up{color:var(--success)}.stat-card .st-down{color:var(--danger)}

/* ===== TABLE ===== */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:10px 12px;background:#fafbfc;border-bottom:1px solid var(--border);font-weight:500;color:var(--text-secondary);font-size:12px;white-space:nowrap}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border-light);color:var(--text)}
.data-table tr:hover td{background:var(--bg-hover);cursor:pointer}
.data-table .tag{padding:2px 8px;border-radius:2px;font-size:11px;font-weight:500;display:inline-block}
.tag-blue{background:#e8f0fe;color:#1a6fff}.tag-green{background:#e6f7f0;color:#00a870}.tag-orange{background:#fef3e6;color:#ed7b2f}.tag-red{background:#fde8ea;color:#e34d59}.tag-gray{background:#f0f1f3;color:#6b7280}

/* ===== BUTTONS ===== */
.btn{padding:7px 16px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:1px solid transparent;font-family:var(--font);transition:all .12s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:var(--bg-white);color:var(--primary);border-color:var(--primary)}
.btn-outline:hover{background:var(--primary-light)}
.btn-default{background:var(--bg-white);color:var(--text);border-color:var(--border)}
.btn-default:hover{background:var(--bg-hover)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{background:var(--bg-white);color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* ===== STEPPER ===== */
.stepper{display:flex;align-items:center;padding:20px 0;gap:0}
.step{display:flex;align-items:center;gap:8px;cursor:pointer;position:relative}
.step-circle{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;border:2px solid var(--border);color:var(--text-muted);
  background:var(--bg-white);transition:all .2s;flex-shrink:0;
}
.step.active .step-circle{background:var(--primary);border-color:var(--primary);color:#fff}
.step.done .step-circle{background:var(--success);border-color:var(--success);color:#fff}
.step-label{font-size:13px;color:var(--text-muted);white-space:nowrap}
.step.active .step-label{color:var(--primary);font-weight:600}
.step.done .step-label{color:var(--success)}
.step-connector{width:40px;height:2px;background:var(--border);margin:0 8px;flex-shrink:0}
.step-connector.done{background:var(--success)}

/* ===== FORM ===== */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.form-label .req{color:var(--danger);margin-left:2px}
.form-input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);color:var(--text);background:var(--bg-white);transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
.form-input:disabled{background:#f5f6f8;color:var(--text-muted);cursor:not-allowed}
.form-select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);color:var(--text);background:var(--bg-white)}
.form-row{display:flex;gap:12px}
.form-row>*{flex:1}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:3px}
.form-check{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px}

/* ===== PROGRESS BAR ===== */
.progress-bar{height:6px;background:var(--border-light);border-radius:3px;overflow:hidden}
.progress-bar .fill{height:100%;background:var(--primary);border-radius:3px;transition:width .4s ease}
.progress-text{font-size:11px;color:var(--text-muted);margin-top:4px;text-align:right}

/* ===== UPLOAD ZONE ===== */
.upload-zone{
  border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;
  cursor:pointer;transition:all .15s;background:#fafbfc;
}
.upload-zone:hover{border-color:var(--primary);background:var(--primary-light)}
.upload-zone .uz-icon{font-size:28px;margin-bottom:6px;color:var(--text-muted)}
.upload-zone .uz-text{font-size:13px;color:var(--text-secondary)}
.upload-zone .uz-hint{font-size:11px;color:var(--text-muted);margin-top:2px}
.upload-done{border-color:var(--success);background:#f0faf5}
.upload-done .uz-icon{color:var(--success)}

/* ===== MAP MINI ===== */
#wiz-map{width:100%;height:240px;border-radius:var(--radius);border:1px solid var(--border)}
.leaflet-tile-pane{filter:grayscale(0.3)}
.leaflet-control-attribution{display:none!important}

/* ===== ALERT ROW ===== */
.alert-row{
  display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border-light);
  cursor:pointer;font-size:13px;
}
.alert-row:hover{background:var(--bg-hover)}
.alert-lv{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.alert-lv.R{background:var(--danger)}.alert-lv.O{background:var(--warn)}.alert-lv.Y{background:#f0c040}.alert-lv.B{background:var(--primary)}

/* ===== MODAL ===== */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--bg-white);border-radius:6px;width:560px;max-height:80vh;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,0.12)}
.modal-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600}
.modal-body{padding:20px}
.modal-ftr{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.modal-close{cursor:pointer;color:var(--text-muted);font-size:18px;padding:0 4px}
.modal-close:hover{color:var(--text)}

/* ===== TOAST ===== */
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 24px;border-radius:var(--radius);font-size:13px;z-index:2000;opacity:0;transition:opacity .25s;pointer-events:none}
#toast.show{opacity:1}
#toast.success{background:var(--success)}
#toast.error{background:var(--danger)}

/* ===== SENSOR GRID ICON ===== */
.sensor-grid{display:flex;gap:10px;flex-wrap:wrap}
.sensor-opt{
  border:2px solid var(--border);border-radius:var(--radius);padding:14px 16px;width:180px;
  cursor:pointer;transition:all .15s;background:var(--bg-white);
}
.sensor-opt:hover{border-color:var(--primary);background:var(--primary-light)}
.sensor-opt.selected{border-color:var(--primary);background:var(--primary-light)}
.sensor-opt .so-name{font-weight:600;font-size:14px;margin-bottom:4px}
.sensor-opt .so-desc{font-size:11px;color:var(--text-secondary);line-height:1.5}
.sensor-opt .so-price{font-size:13px;color:var(--primary);font-weight:500;margin-top:6px}
.sensor-opt .so-check{float:right;color:var(--primary);font-size:18px;display:none}
.sensor-opt.selected .so-check{display:block}

/* ===== NOTIFICATION DOT ===== */
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* ===== INLINE CHART ===== */
.inline-chart{width:100%;height:160px}

/* ===== CATEGORY SWITCH ===== */
.cat-switch{display:inline-flex;background:var(--bg);border-radius:4px;padding:2px;gap:0}
.cat-switch .cat-pill{padding:5px 14px;border-radius:3px;cursor:pointer;font-size:12px;color:var(--text-secondary);transition:all .15s;white-space:nowrap;border:none;background:transparent;font-family:var(--font)}
.cat-switch .cat-pill:hover{color:var(--text)}
.cat-switch .cat-pill.active{background:var(--bg-white);color:var(--primary);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,0.08)}
</style>
</head>
<body>

<!-- TOP NAV -->
<div id="topnav">
  <span class="sys-name">长白山金融化平台<span class="ver">v1.0 内测</span></span>
  <span class="tn-item active">工作台</span>
  <span class="tn-item" onclick="location.href='银行-工作台.html'">银行端</span>
  <span class="tn-item" onclick="location.href='评估师-工作台.html'">评估师端</span>
  <span class="tn-item" onclick="location.href='政府监管-工作台.html'">政府监管端</span>
  <span class="tn-item" onclick="location.href='担保保险-工作台.html'">担保/保险端</span>
  <span class="tn-right">
    <div class="cat-switch" style="margin-right:8px">
      <button class="cat-pill active" id="cat-ginseng" onclick="switchCategoryUI('ginseng')">🌿 林下参</button>
      <button class="cat-pill" id="cat-fungi" onclick="switchCategoryUI('fungi')">🍄 桑黄/灵芝</button>
    </div>
    <span class="tn-badge" onclick="switchPage('alerts')">预警<span class="dot pulse"></span></span>
    <span class="tn-badge" onclick="showToast('消息中心：暂无新消息','')">消息</span>
    <span class="tn-user">长白山参业有限公司 &#9662;</span>
  </span>
</div>

<!-- LAYOUT -->
<div id="layout">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sm-group">
      <div class="sm-item active" onclick="switchPage('overview')" data-page="overview">
        <span class="sm-ico">&#9681;</span> 工作台概览
      </div>
    </div>
    <div class="sm-group">
      <div class="sm-group-title">资产管理</div>
      <div class="sm-item" onclick="switchPage('assets')" data-page="assets">
        <span class="sm-ico">&#9638;</span> 我的资产
      </div>
      <div class="sm-item" onclick="switchPage('onboard')" data-page="onboard" style="color:var(--primary);font-weight:500">
        <span class="sm-ico">&#10010;</span> 资产上链
      </div>
      <div class="sm-item" onclick="switchPage('sensors')" data-page="sensors">
        <span class="sm-ico">&#9673;</span> 传感器状态
      </div>
    </div>
    <div class="sm-group">
      <div class="sm-group-title">融资管理</div>
      <div class="sm-item" onclick="switchPage('finance')" data-page="finance">
        <span class="sm-ico">&#9637;</span> 融资申请
        <span class="sm-badge">2</span>
      </div>
      <div class="sm-item" onclick="switchPage('loans')" data-page="loans">
        <span class="sm-ico">&#9640;</span> 在押贷款
      </div>
    </div>
    <div class="sm-group">
      <div class="sm-group-title">监控</div>
      <div class="sm-item" onclick="switchPage('alerts')" data-page="alerts">
        <span class="sm-ico">&#9888;</span> 预警中心
        <span class="sm-badge">5</span>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="shared-data.js"></script>
<script>
// ==================== STATE ====================
let currentPage='overview';

function onStateSync(state){
  if(currentPage==='overview') renderOverview();
  else if(currentPage==='assets') renderAssets();
  else if(currentPage==='sensors') renderSensors();
  else if(currentPage==='finance') renderFinance();
  else if(currentPage==='pledged') renderPledged();
}
function onCategorySwitch(cat){
  document.getElementById('cat-ginseng').classList.toggle('active',cat==='ginseng');
  document.getElementById('cat-fungi').classList.toggle('active',cat==='fungi');
}
function switchCategoryUI(cat){
  switchCategory(cat);
  onCategorySwitch(cat);
  renderPage(currentPage);
}
function filteredAssets(){
  return assetData.filter(function(a){return a.cat===($S.category==='fungi'?'fungi':'ginseng')});
}
const assetData=[
  // 林下参
  {cat:'ginseng',id:'CB-2024-A03',name:'A地块·12年参龄',type:'林下参',area:18.5,age:12,sensors:14,sv:88.5,status:'monitoring',loan:null,value:1062},
  {cat:'ginseng',id:'CB-2024-B07',name:'B地块·8年参龄',type:'林下参',area:22.0,age:8,sensors:12,sv:72.3,status:'monitoring',loan:null,value:868},
  {cat:'ginseng',id:'CB-2025-C01',name:'C地块·5年参龄',type:'林下参',area:15.0,age:5,sensors:8,sv:65.8,status:'onboarding',loan:null,value:395},
  {cat:'ginseng',id:'CB-2024-D05',name:'D地块·10年参龄',type:'林下参',area:25.5,age:10,sensors:16,sv:85.0,status:'pledged',loan:'LK-2026-0012',value:1275},
  {cat:'ginseng',id:'CB-2024-E02',name:'E地块·7年参龄',type:'林下参',area:20.0,age:7,sensors:10,sv:78.5,status:'monitoring',loan:null,value:942},
  // 桑黄/灵芝真菌
  {cat:'fungi',id:'GH-2025-SH07',name:'大棚1号·桑黄批次7',type:'桑黄',area:2.8,age:185,sensors:22,sv:92.0,status:'monitoring',loan:null,value:1650},
  {cat:'fungi',id:'GH-2025-SH10',name:'大棚3号·桑黄批次10',type:'桑黄',area:3.2,age:120,sensors:20,sv:89.5,status:'monitoring',loan:null,value:1420},
  {cat:'fungi',id:'GH-2025-LZ03',name:'林下区块2·灵芝批次3',type:'灵芝',area:4.0,age:210,sensors:18,sv:94.0,status:'pledged',loan:'LK-2026-0019',value:2100},
  {cat:'fungi',id:'GH-2025-LZ05',name:'大棚2号·灵芝批次5',type:'灵芝',area:2.5,age:160,sensors:14,sv:86.0,status:'onboarding',loan:null,value:1180},
];

const alertItems=[
  {lv:'R',title:'A-03 10cm地温-3.2°C持续14h',detail:'触发冻害红色预警，建议立即检查参根状态并启动保温措施',time:'14:32',loc:'A地块'},
  {lv:'O',title:'E-02 30cm含水量41.2%持续28h',detail:'触发涝害橙色预警，检查排水沟是否堵塞',time:'12:15',loc:'E地块'},
  {lv:'Y',title:'B-07 30cm含水量13.5%连续52h',detail:'触发干旱黄色预警，土壤含水量持续低于15%阈值',time:'08:40',loc:'B地块'},
  {lv:'B',title:'C-01 -30cm传感器连续7h无数据',detail:'设备可能离线，建议现场检查供电和通信模块',time:'06:22',loc:'C地块'},
  {lv:'Y',title:'D-05 声振传感器检测异常振动',detail:'边界区域检测到低频振动信号，置信度78%',time:'02:55',loc:'D地块'},
];

// ==================== PAGE RENDERERS ====================
const mainEl=document.getElementById('main');

function switchPage(page){
  currentPage=page;
  document.querySelectorAll('.sm-item').forEach(el=>el.classList.remove('active'));
  const nav=document.querySelector(`[data-page="${page}"]`);
  if(nav) nav.classList.add('active');
  renderPage(page);
}

function renderPage(page){
  switch(page){
    case 'overview': renderOverview(); break;
    case 'assets': renderAssets(); break;
    case 'onboard': renderOnboard(); break;
    case 'sensors': renderSensors(); break;
    case 'finance': renderFinance(); break;
    case 'loans': renderLoans(); break;
    case 'alerts': renderAlerts(); break;
    default: renderOverview();
  }
}

// ===== OVERVIEW =====
function renderOverview(){
  var assets=filteredAssets();
  var totalValue=assets.reduce(function(s,a){return s+a.value},0);
  var monitoring=assets.filter(function(a){return a.status==='monitoring'||a.status==='pledged'}).length;
  var totalSensors=assets.reduce(function(s,a){return s+a.sensors},0);
  var isFungi=$S.category==='fungi';
  var ageLabel=isFungi?'天':'年';
  var unitLabel=isFungi?'批':'块';
  var rateLabel=isFungi?'AI品级率':'AI存活率';
  var colSpan=isFungi?6:5;
  mainEl.innerHTML=`
    <div class="breadcrumb">工作台 <span>/ 概览</span></div>
    <div class="page-hdr"><h2>工作台概览</h2><span style="color:var(--text-muted);font-size:12px">数据更新于 ${new Date().toLocaleString('zh-CN')}</span></div>

function renderWizStep(){
  var isFungi=$S.category==='fungi';
  var assetType=isFungi?'真菌批次':'林下参地块';
  var steps=[
    {num:1,title:'权属确权',desc:isFungi?'林下经济经营权证 + 大棚/区块确认':'林权证上传与RTK边界测绘'},
    {num:2,title:'传感器部署',desc:isFungi?'微气候+菌椴探针+近红外检测':'选择传感器类型与部署方案'},
    {num:3,title:'数据接入验证',desc:'确认传感器数据正常回传'},
    {num:4,title:'生成融资数据包',desc:'系统自动生成标准化融资数据包'},
    {num:5,title:'提交贷款申请',desc:'推送给合作银行'},
  ];
  const stepperHTML=`
    <div class="stepper">
      ${steps.map((s,i)=>`
        <div class="step ${wizStep===s.num?'active':''} ${wizStep>s.num?'done':''}" onclick="${wizStep>s.num?`wizGoTo(${s.num})`:''}">
          <div class="step-circle">${wizStep>s.num?'✓':s.num}</div>
          <div class="step-label">${s.title}<br><span style="font-size:10px;font-weight:400">${s.desc}</span></div>
        </div>
        ${i<4?`<div class="step-connector ${wizStep>s.num?'done':''}"></div>`:''}
      `).join('')}
    </div>`;

  let bodyHTML='';
  switch(wizStep){
    case 1: bodyHTML=renderWizStep1(); break;
    case 2: bodyHTML=renderWizStep2(); break;
    case 3: bodyHTML=renderWizStep3(); break;
    case 4: bodyHTML=renderWizStep4(); break;
    case 5: bodyHTML=renderWizStep5(); break;
  }

  mainEl.innerHTML=`
    <div class="breadcrumb">资产管理 <span>/ 资产上链</span></div>
    <div class="page-hdr"><h2>资产上链</h2><span style="color:var(--text-muted);font-size:12px">将${isFungi?'真菌批次':'林下参地块'}完成数字化确权、传感器部署、融资数据包生成</span></div>
    <div class="card"><div class="card-body">${stepperHTML}</div></div>
    <div class="card"><div class="card-body">${bodyHTML}</div></div>
  `;

  if(wizStep===1) setTimeout(initWizMap,200);
}

function simulateUpload(el,type){
  if(type==='cert'){
    wizState.certNo=wizState.certNo||'吉林证字[2024]第CB'+Math.floor(Math.random()*9000+1000)+'号';
    document.getElementById('f-cert').value=wizState.certNo;
  }
  el.classList.add('upload-done');
  el.querySelector('.uz-icon').textContent='✓';
  el.querySelector('.uz-text').textContent=type==='cert'?wizState.certNo:'照片已上传 (3张)';
  showToast(type==='cert'?($S.category==='fungi'?'经营权证上传完成':'林权证上传完成'):'照片上传完成','success');
}

function startRTK(){
  const btn=document.getElementById('btn-rtk');const st=document.getElementById('rtk-status');
  btn.disabled=true;btn.textContent='测绘中...';st.textContent='RTK设备连接中...';
  setTimeout(()=>{st.textContent='正在采集边界坐标点...';},1000);
  setTimeout(()=>{st.textContent='正在差分校正...';},2500);
  setTimeout(()=>{
    st.innerHTML='<span style="color:var(--success)">✓ 测绘完成 | 边界坐标点: 12个 | 精度: ±3.8cm | CGS2000坐标系</span>';
    btn.textContent='重新测绘';btn.disabled=false;
    showToast('RTK边界测绘完成，精度±3.8cm','success');
  },4000);
}

function initWizMap(){
  const el=document.getElementById('wiz-map');if(!el||el._init)return;el._init=true;
  const m=L.map(el,{center:[wizState.lat,wizState.lon],zoom:13,zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(m);
  L.circle([wizState.lat,wizState.lon],{radius:200,color:'#1a6fff',fillColor:'#1a6fff',fillOpacity:0.15,weight:2}).addTo(m);
  L.marker([wizState.lat,wizState.lon]).addTo(m).bindPopup('地块中心点').openPopup();
}

  wizState.name=n;

    {id:'micro',name:'微气候传感器',desc:'大棚内温湿度/CO2浓度/光照强度四合一监测，每5分钟采集一次',price:'¥1,800/台',qty:Math.ceil((parseFloat(wizState.area)||2.8)*3)},
    {id:'spawn',name:'菌椴探针',desc:'插入菌椴内部监测基质温度、含水量、菌丝活性电导率，关键生长参数',price:'¥2,200/台',qty:Math.ceil((parseFloat(wizState.area)||2.8)*6)},
    {id:'nir',name:'近红外光谱检测仪',desc:'非侵入式检测菌椴营养成分、多糖含量、杂菌污染预警，波段900-1700nm',price:'¥5,600/台',qty:2},
    {id:'cam',name:'大棚监控摄像头',desc:'覆盖大棚全景+关键菌架，支持移动侦测+环境异常联动报警',price:'¥2,800/台',qty:4},
  ]:[
    {id:'soil3',name:'土壤三层传感器',desc:'-10cm/-30cm/-50cm垂直剖面监测温度、含水量、pH值，每15分钟采集一次',price:'¥1,200/台',qty:Math.ceil((parseFloat(wizState.area)||20)/2)},
    {id:'geo',name:'声振安防传感器',desc:'地表以下30-50cm埋设，压电效应探测人为挖掘振动，AI分类识别',price:'¥2,800/台',qty:Math.ceil((parseFloat(wizState.area)||20)/4)},
    {id:'par',name:'PAR光照传感器',desc:'测量林冠下方光合有效辐射，用于评估光照条件对参根生长的影响',price:'¥850/台',qty:3},
    {id:'cam',name:'红外监控摄像头',desc:'重点区域布设，支持夜间红外+移动侦测，与声振传感器联动',price:'¥3,500/台',qty:2},
  ];
  const selected=wizState.sensors||[];
  const totalCost=selected.reduce((s,id)=>{const st=sensorTypes.find(x=>x.id===id);return s+(st?parseInt(st.price.replace(/[^0-9]/g,''))*st.qty:0)},0);

    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">请选择需要部署的传感器类型。系统根据地块面积（${wizState.area||'--'}亩）自动计算建议数量。</div>

function toggleSensor(id){
  const sel=wizState.sensors||[];const idx=sel.indexOf(id);
  if(idx>=0) sel.splice(idx,1);else sel.push(id);
  wizState.sensors=sel;renderWizStep();
}

function confirmStep2(){
  if(!wizState.sensors||wizState.sensors.length===0){showToast('请至少选择一类传感器','error');return;}
  showToast('部署方案已确认，进入数据接入验证','success');
  wizGoTo(3);
}

function renderWizStep3(){
  const now=new Date();const times=Array.from({length:12},(_,i)=>new Date(now- (11-i)*5*60000));
  const temps=times.map(t=>+(6+4*Math.sin((t%86400000)/86400000*2*Math.PI)+(Math.random()-0.5)*1.5).toFixed(1));
  const moist=times.map(t=>+(32+5*Math.sin((t%86400000)/86400000*2*Math.PI)+(Math.random()-0.5)*2).toFixed(1));
  const dataPoints=times.length;

  setTimeout(()=>{
    const el=document.getElementById('inline-chart');
    if(el&&!el._chart){
      el._chart=echarts.init(el);
      el._chart.setOption({
        grid:{left:50,right:10,top:10,bottom:24},
        xAxis:{type:'category',data:times.map(t=>t.toTimeString().slice(0,5)),axisLabel:{fontSize:9,rotate:30}},
        yAxis:{type:'value',name:'°C / %',axisLabel:{fontSize:9},splitLine:{lineStyle:{type:'dashed',color:'#e5e7eb'}}},
        series:[
          {name:'地温(-30cm)',type:'line',data:temps,smooth:true,symbol:'none',lineStyle:{color:'#e34d59',width:1.5}},
          {name:'含水量(-30cm)',type:'line',data:moist,smooth:true,symbol:'none',lineStyle:{color:'#1a6fff',width:1.5}}
        ],legend:{bottom:0,textStyle:{fontSize:9},itemWidth:12,itemHeight:2},tooltip:{trigger:'axis'}
      });
    }
  },200);

  return `
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">传感器已部署至${wizState.name||'待确认地块'}。系统正在验证数据回传通道。以下为最近1小时实时数据：</div>
    ${wizState.dataOk?`<div style="background:#f0faf5;padding:10px 14px;border-radius:4px;margin-bottom:12px;color:var(--success);font-size:13px">✓ 数据接入验证通过 | 共${dataPoints}个采样点 | 丢包率 0.0% | 延迟 < 1s</div>`:''}
    <div class="inline-chart" id="inline-chart"></div>
    <div style="display:flex;gap:12px;margin-top:12px">
      <div style="flex:1;padding:10px;background:#fafbfc;border-radius:4px;text-align:center"><div style="font-size:11px;color:var(--text-muted)">数据采集频率</div><div style="font-weight:600">每15分钟</div></div>
      <div style="flex:1;padding:10px;background:#fafbfc;border-radius:4px;text-align:center"><div style="font-size:11px;color:var(--text-muted)">通信方式</div><div style="font-weight:600">LoRaWAN 470MHz</div></div>
      <div style="flex:1;padding:10px;background:#fafbfc;border-radius:4px;text-align:center"><div style="font-size:11px;color:var(--text-muted)">边缘缓存</div><div style="font-weight:600">256GB SSD</div></div>
      <div style="flex:1;padding:10px;background:#fafbfc;border-radius:4px;text-align:center"><div style="font-size:11px;color:var(--text-muted)">区块链存证</div><div style="font-weight:600">SHA-256哈希</div></div>

}

          <tr><td style="color:var(--text-secondary)">传感器部署</td><td>${(wizState.sensors||[]).length}类传感器，共${wizState.sensors.reduce((s,id)=>{const st={soil3:Math.ceil((parseFloat(wizState.area)||20)/2),geo:Math.ceil((parseFloat(wizState.area)||20)/4),par:3,cam:2};return s+(st[id]||0)},0)}台</td></tr>

          <tr><td style="color:var(--text-secondary)">数据完整性</td><td style="color:var(--success)">✓ 通过Merkle树验证</td></tr>

      <button class="btn btn-primary" onclick="confirmStep4()">确认并生成融资数据包</button>

      <button class="btn btn-default" onclick="wizGoTo(3)">上一步</button>

function confirmStep4(){
  showToast('融资数据包已生成并上链存证，哈希值已写入FISCO BCOS联盟链','success');

}

function renderWizStep5(){
  const banks=['吉林银行长白山支行','中国农业银行吉林省分行','长白山农村商业银行','亿联银行（互联网银行）'];
  return `

    <div class="form-group"><label class="form-label">选择贷款银行 <span class="req">*</span></label></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
      ${banks.map((b,i)=>`
        <div style="flex:1;min-width:200px;border:2px solid var(--border);border-radius:4px;padding:16px;cursor:pointer;transition:all .15s"
             onmouseenter="this.style.borderColor='var(--primary)'" onmouseleave="this.style.borderColor='var(--border)'"
             id="bank-${i}" onclick="selectBank(${i})">
          <div style="font-weight:600;margin-bottom:4px">${b}</div>
          <div style="font-size:11px;color:var(--text-muted)">${['林下参质押贷专项合作行','乡村振兴金融服务','地方特色产业支持','线上快速审批通道'][i]}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px">预计审批: ${['3-5','5-7','7-10','1-3'][i]}个工作日</div>

      <div class="form-group"><label class="form-label">申请贷款金额（万元）</label><input class="form-input" type="number" value="${(parseFloat(wizState.area)||20)*(parseFloat(wizState.age)||8)*5.5*0.6|0}" id="f-loan-amount"></div>

}

let selectedBank=-1;
function selectBank(i){
  selectedBank=i;
  document.querySelectorAll('[id^="bank-"]').forEach(el=>el.style.borderColor='var(--border)');
  document.querySelectorAll('[id^="bank-check-"]').forEach(el=>el.style.display='none');
  document.getElementById('bank-'+i).style.borderColor='var(--primary)';
  document.getElementById('bank-check-'+i).style.display='block';
}

function submitApplication(){
  if(selectedBank<0){showToast('请选择贷款银行','error');return;}
  const btn=document.getElementById('btn-submit');
  btn.disabled=true;btn.textContent='提交中...';
  setTimeout(()=>{
    btn.textContent='✓ 已提交';
    btn.style.background='var(--success)';btn.style.borderColor='var(--success)';
    showToast('贷款申请已成功推送至合作银行！预计3-5个工作日反馈审批结果。\n申请编号: LA-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'-'+Math.floor(Math.random()*9000+1000),'success');
    // Add to asset list
    assetData.push({
      id:'CB-'+new Date().getFullYear()+'-'+wizState.name,
      name:wizState.name||'新地块',
      type:'林下参',area:parseFloat(wizState.area)||20,age:parseInt(wizState.age)||5,
      sensors:(wizState.sensors||[]).reduce((s,id)=>{const st={soil3:Math.ceil((parseFloat(wizState.area)||20)/2),geo:Math.ceil((parseFloat(wizState.area)||20)/4),par:3,cam:2};return s+(st[id]||0)},0),
      sv:+(70+Math.random()*20).toFixed(1),status:'financing',loan:null,value:Math.floor((parseFloat(wizState.area)||20)*(parseFloat(wizState.age)||8)*5.5)
    });
  },2000);
}

// ===== SENSORS =====
function renderSensors(){
  var assets=filteredAssets();
  var isFungi=$S.category==='fungi';
  var allSensors=[];
  assets.forEach(function(a){
    var snTypes=isFungi?['微气候','菌椴探针','近红外','监控']:['土壤三层','声振安防','PAR光照','红外监控'];
    for(var i=1;i<=a.sensors;i++){
      var tIdx=Math.floor(Math.random()*4);
      allSensors.push({
        id:a.id.split('-').pop()+'-S'+String(i).padStart(2,'0'),
        asset:a.name,
        type:snTypes[tIdx],
        metric1:isFungi?+(20+Math.random()*8).toFixed(1)+'°C / '+(65+Math.random()*20).toFixed(0)+'%RH':+(5+Math.random()*15).toFixed(1)+'°C',
        metric2:isFungi?+(380+Math.random()*200).toFixed(0)+'ppm CO₂':+(25+Math.random()*18).toFixed(1)+'%',
        status:Math.random()<0.02?'offline':Math.random()<0.08?'warn':'normal',
        lastUpdate:new Date(Date.now()-Math.floor(Math.random()*15*60000)).toTimeString().slice(0,5)
      });
    }
  });
  mainEl.innerHTML=`
    <div class="breadcrumb">监控 <span>/ 传感器状态</span></div>
    <div class="page-hdr"><h2>传感器状态</h2><span style="color:var(--text-muted);font-size:12px">共 ${allSensors.length} 台设备</span></div>
    <div class="card"><div class="card-body nopad">
      <table class="data-table">
        <thead><tr><th>设备ID</th><th>所属资产</th><th>类型</th><th>${isFungi?'温湿度':'温度(°C)'}</th><th>${isFungi?'CO₂浓度':'含水量(%)'}</th><th>状态</th><th>最后更新</th><th>操作</th></tr></thead>
        <tbody>${allSensors.map(function(s){return '<tr><td style="color:var(--primary)">'+s.id+'</td><td>'+s.asset+'</td><td>'+s.type+'</td><td>'+s.metric1+'</td><td>'+s.metric2+'</td><td>'+(s.status==='normal'?'<span class="tag tag-green">正常</span>':s.status==='warn'?'<span class="tag tag-orange">异常</span>':'<span class="tag tag-red">离线</span>')+'</td><td>'+s.lastUpdate+'</td><td><button class="btn btn-outline btn-sm" onclick="showToast(\'传感器'+s.id+': 信号强度-72dBm | 电池3.7V | LoRaWAN CH4\',\'\')">诊断</button></td></tr>';}).join('')}</tbody>
      </table>
    </div></div>`;
}

// ===== ALERTS =====
function renderAlerts(){
  mainEl.innerHTML=`
    <div class="breadcrumb">监控 <span>/ 预警中心</span></div>
    <div class="page-hdr"><h2>预警中心</h2><span style="color:var(--text-muted);font-size:12px">共 ${alertItems.length} 条活跃预警</span></div>

          <span style="width:8px;height:8px;border-radius:50%;background:${a.lv==='R'?'var(--danger)':a.lv==='O'?'var(--warn)':a.lv==='Y'?'#f0c040':'var(--primary)'};flex-shrink:0;margin-top:4px"></span>
          <span style="flex:1;font-weight:500">${a.title}</span>
          <span style="color:var(--text-muted);font-size:12px">${a.loc}</span>

// ===== ASSET DETAIL =====
function showAssetDetail(id){
  var a=assetData.find(function(x){return x.id===id});if(!a)return;
  var isFungi=a.cat==='fungi';
  var ageStr=isFungi?(a.age+'天培育'):(a.age+'年参龄');
  var certStr=isFungi?('吉经营权证[2025]第GH'+Math.floor(Math.random()*9000+1000)+'号'):('吉林证字[2024]第CB'+Math.floor(Math.random()*9000+1000)+'号');
  var precisionStr=isFungi?'GPS定位 ±3m':'RTK精度: ±3.8cm';
  showToast('资产详情: '+a.name+'\n编号: '+a.id+'\n品类: '+a.type+'\n'+ageStr+'\n面积: '+a.area+'亩\nAI'+(isFungi?'品级率':'存活率')+': '+a.sv+'%\n估值: ¥'+a.value+'万\n传感器: '+a.sensors+'台\n状态: '+a.status+'\n'+certStr+'\n'+precisionStr+'\n上链哈希: 0x'+Array.from({length:16},function(){return Math.floor(Math.random()*16).toString(16)}).join(''),'');
}

// ==================== UTILS ====================
let toastTimer;
function showToast(msg,type){
  const el=document.getElementById('toast');el.textContent=msg;el.className=type||'';
  el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3500);
}

// ==================== INIT ====================
renderPage('overview');
</script>
