<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>担保/保险工作台 — 长白山金融化平台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root{
  --bg:#f0f2f5;--bg-white:#fff;--bg-hover:#f7f8fa;--bg-active:#e8f0fe;
  --primary:#1a6fff;--primary-light:#e8f0fe;--primary-dark:#1557cc;
  --success:#00a870;--warn:#ed7b2f;--danger:#e34d59;
  --text:#1f2937;--text-secondary:#6b7280;--text-muted:#9ca3af;
  --border:#e5e7eb;--border-light:#f0f1f3;
  --font:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;
  --radius:4px;--shadow:0 1px 3px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden;width:100vw;height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
#topnav{height:48px;background:var(--bg-white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:0;box-shadow:var(--shadow);position:relative;z-index:100}
#topnav .sys-name{font-size:15px;font-weight:600;color:var(--text);margin-right:24px;white-space:nowrap}
#topnav .sys-name .ver{font-size:11px;color:var(--text-muted);font-weight:400;margin-left:6px}
#topnav .tn-item{padding:0 16px;height:48px;line-height:48px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
#topnav .tn-item:hover{color:var(--text)}
#topnav .tn-item.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500}
#topnav .tn-right{margin-left:auto;display:flex;align-items:center;gap:16px}
#topnav .tn-badge{position:relative;cursor:pointer;padding:4px 8px;border-radius:var(--radius);font-size:12px;color:var(--text-secondary)}
#topnav .tn-badge:hover{background:var(--bg-hover)}
#topnav .tn-badge .cnt{background:var(--danger);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:4px}
#topnav .tn-user{font-size:13px;color:var(--text);cursor:pointer;padding:4px 8px;border-radius:var(--radius)}
#topnav .tn-user:hover{background:var(--bg-hover)}
#layout{display:flex;height:calc(100vh - 48px)}
#sidebar{width:200px;background:var(--bg-white);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:8px 0;flex-shrink:0;overflow-y:auto}
.sm-group{padding:4px 0}
.sm-group-title{padding:8px 20px 4px;font-size:11px;color:var(--text-muted);font-weight:500}
.sm-item{display:flex;align-items:center;gap:10px;padding:9px 20px;margin:1px 8px;border-radius:var(--radius);cursor:pointer;color:var(--text-secondary);font-size:13px;transition:all .12s;white-space:nowrap}
.sm-item:hover{background:var(--bg-hover);color:var(--text)}
.sm-item.active{background:var(--primary-light);color:var(--primary);font-weight:500}
.sm-item .sm-badge{margin-left:auto;font-size:11px;background:var(--danger);color:#fff;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
#main{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.page-hdr{display:flex;align-items:center;justify-content:space-between}
.page-hdr h2{font-size:18px;font-weight:600}
.breadcrumb{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:14px}
.card-body{padding:16px}.card-body.nopad{padding:0}
.stats-row{display:flex;gap:12px}
.stat-card{flex:1;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.stat-card .st-label{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.stat-card .st-val{font-size:24px;font-weight:700}
.stat-card .st-sub{font-size:11px;color:var(--text-secondary);margin-top:4px}
.st-up{color:var(--success)}.st-down{color:var(--danger)}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:10px 12px;background:#fafbfc;border-bottom:1px solid var(--border);font-weight:500;color:var(--text-secondary);font-size:12px;white-space:nowrap}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border-light)}
.data-table tr:hover td{background:var(--bg-hover);cursor:pointer}
.tag{padding:2px 8px;border-radius:2px;font-size:11px;font-weight:500;display:inline-block}
.tag-blue{background:#e8f0fe;color:#1a6fff}.tag-green{background:#e6f7f0;color:#00a870}.tag-orange{background:#fef3e6;color:#ed7b2f}.tag-red{background:#fde8ea;color:#e34d59}.tag-gray{background:#f0f1f3;color:#6b7280}
.btn{padding:7px 16px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:1px solid transparent;font-family:var(--font);transition:all .12s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:var(--bg-white);color:var(--primary);border-color:var(--primary)}
.btn-outline:hover{background:var(--primary-light)}
.btn-default{background:var(--bg-white);color:var(--text);border-color:var(--border)}
.btn-default:hover{background:var(--bg-hover)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.form-input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);color:var(--text)}
.form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
.form-input:disabled{background:#f5f6f8;color:var(--text-muted)}
.ltv-bar{height:8px;background:var(--border-light);border-radius:4px;margin-top:4px;position:relative}
.ltv-bar .fill{height:100%;border-radius:4px;transition:width .3s}
.ltv-bar .marker{position:absolute;top:-2px;width:2px;height:12px;background:var(--danger);border-radius:1px}
.ltv-bar .marker-label{position:absolute;top:10px;font-size:9px;color:var(--danger);transform:translateX(-50%)}
.cat-switch{display:inline-flex;background:var(--bg);border-radius:4px;padding:2px;gap:0}
.cat-switch .cat-pill{padding:5px 14px;border-radius:3px;cursor:pointer;font-size:12px;color:var(--text-secondary);transition:all .15s;white-space:nowrap;border:none;background:transparent;font-family:var(--font)}
.cat-switch .cat-pill:hover{color:var(--text)}
.cat-switch .cat-pill.active{background:var(--bg-white);color:var(--primary);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,0.08)}
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 24px;border-radius:var(--radius);font-size:13px;z-index:2000;opacity:0;transition:opacity .25s;pointer-events:none;white-space:pre-line}
#toast.show{opacity:1}
#toast.success{background:var(--success)}
#toast.error{background:var(--danger)}
.risk-meter{display:flex;gap:4px;align-items:center}
.risk-meter .rm-seg{width:24px;height:6px;border-radius:1px;background:var(--border-light)}
.risk-meter .rm-seg.lit-green{background:var(--success)}
.risk-meter .rm-seg.lit-yellow{background:#f0c040}
.risk-meter .rm-seg.lit-orange{background:var(--warn)}
.risk-meter .rm-seg.lit-red{background:var(--danger)}
</style>
</head>
<body>

<div id="topnav">
  <span class="sys-name">长白山金融化平台<span class="ver">v1.0  ·  担保/保险端</span></span>
  <span class="tn-item active">风控与理赔</span>

</div>

<div id="layout">
  <div id="sidebar">
    <div class="sm-group">
      <div class="sm-item active" onclick="switchPage('overview')" data-page="overview">工作台概览</div>
    </div>
    <div class="sm-group">
      <div class="sm-group-title">协同审查</div>
      <div class="sm-item" onclick="switchPage('coreview')" data-page="coreview">待审查申请<span class="sm-badge">5</span></div>
      <div class="sm-item" onclick="switchPage('review-history')" data-page="review-history">审查历史</div>
    </div>
    <div class="sm-group">
      <div class="sm-group-title">风险监控</div>
      <div class="sm-item" onclick="switchPage('ltv')" data-page="ltv">LTV趋势</div>
      <div class="sm-item" onclick="switchPage('alerts')" data-page="alerts">预警处置<span class="sm-badge">4</span></div>
      <div class="sm-item" onclick="switchPage('risk-ranking')" data-page="risk-ranking">风险排行</div>
    </div>
    <div class="sm-group">
      <div class="sm-group-title">理赔管理</div>
      <div class="sm-item" onclick="switchPage('claims-prep')" data-page="claims-prep">前置材料<span class="sm-badge">1</span></div>
      <div class="sm-item" onclick="switchPage('claims-history')" data-page="claims-history">历史理赔</div>
    </div>
    <div class="sm-group">
      <div class="sm-group-title">工具</div>
      <div class="sm-item" onclick="switchPage('evidence')" data-page="evidence">证据链调取</div>
      <div class="sm-item" onclick="switchPage('risk-report')" data-page="risk-report">风险评估报告</div>
    </div>
  </div>
  <div id="main"></div>
</div>
<div id="toast"></div>

<script src="shared-data.js"></script>
<script>
var currentPage='overview';
var mainEl=document.getElementById('main');

// Loading state — ensures page is never truly blank
mainEl.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:14px">正在加载工作台...</div>';

// Global error handler — surfaces JS errors visibly
window.onerror=function(msg,url,line,col,err){
  if(mainEl) mainEl.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px"><div style="font-size:18px;font-weight:600;color:var(--danger)">页面加载异常</div><div style="font-size:13px;color:var(--text-secondary);max-width:500px;text-align:center;line-height:1.8">错误: '+String(msg).replace(/</g,'&lt;').replace(/&/g,'&amp;')+'<br>位置: 第'+line+'行<br><br>请尝试 <a href="javascript:location.reload()" style="color:var(--primary)">刷新页面</a> 或打开浏览器控制台 (F12) 查看详情</div></div>';
  return false;
};

function onStateSync(state){
  try{
    if(currentPage==='overview') renderOverview();
    else if(currentPage==='ltv') renderLTV();
    else if(currentPage==='alerts') renderAlerts();
  }catch(e){ if(mainEl) mainEl.innerHTML='<div style="padding:40px;color:var(--danger)">同步渲染失败: '+String(e.message)+'</div>'; }
}
function onCategorySwitch(cat){
  try{
    var g=document.getElementById('gcat-ginseng');
    var f=document.getElementById('gcat-fungi');
    if(g) g.classList.toggle('active',cat==='ginseng');
    if(f) f.classList.toggle('active',cat==='fungi');
  }catch(e){}
}
function switchCategoryUI(cat){
  switchCategory(cat);
  onCategorySwitch(cat);
  switchPage(currentPage);
}

// ===== DATA =====

  {cat:'fungi',id:'GA-2026-0021',asset:'林下区块2·灵芝批次3',applicant:'灵芝堂种植基地',bank:'建设银行',insuredAmount:1260,ltv:48.0,ltvLimit:60,sv:94.0,value:2100,status:'normal',alertsIn30d:0,region:'白山',policyNo:'吉农保-2026-G021',policyExp:'2027-01-05',compensationFund:'—— 待审核'},

  {id:'RV-2026-0515',appId:'LA-20260515-0031',asset:'新开河地块·9年参龄',bank:'吉林银行',amount:480,ltv:58,type:'担保审批',date:'2026-05-15',status:'pending',compOk:true},
  {id:'RV-2026-0510',appId:'LA-20260510-0026',asset:'大棚1号·桑黄批次7',bank:'吉林银行',amount:990,ltv:60,type:'担保审批',date:'2026-05-10',status:'pending',compOk:true},

  {lv:'O',title:'桑黄批次2 CO₂多次超标——损耗率自动上调',loc:'桑黄批次2·延边',time:'08:40',action:'待处置',desc:'培育周期内CO₂>2000ppm累计8.5h，畸形率预估上浮2.3%'},

  {lv:'Y',title:'B地块30cm含水量连续下降',loc:'B地块·通化',time:'昨天 14:20',action:'已标记',desc:'近7天含水量从28%降至19%，接近干旱预警阈值'},

  {id:'CL-2026-0003',asset:'F地块·6年参龄',event:'冻害预警(橙)触发保险前置',date:'2026-05-18',materialStatus:'传感器数据+AI估值报告已就绪',policyStatus:'保单有效',action:'待提交'},
];

  {id:'CL-2025-0012',asset:'G地块·8年参龄',event:'野猪拱地损毁',date:'2025-11-20',amount:85,status:'已赔付',policyPay:68},
  {id:'CL-2025-0008',asset:'桑黄批次1',event:'暴雪压塌大棚',date:'2025-12-15',amount:120,status:'已赔付',policyPay:96},

function filteredAssets(){
  return guaranteeAssets.filter(function(a){return a.cat===($S.category==='fungi'?'fungi':'ginseng')});
}
function filteredReviews(){
  return reviewTasks.filter(function(r){
    var isF=$S.category==='fungi';
    return isF ? r.asset.indexOf('桑黄')>=0||r.asset.indexOf('灵芝')>=0 : r.asset.indexOf('参')>=0&&r.asset.indexOf('桑黄')<0&&r.asset.indexOf('灵芝')<0;
  });
}
function filteredAlerts(){
  return alertItems.filter(function(a){return $S.category==='fungi'?a.loc.indexOf('桑黄')>=0||a.loc.indexOf('灵芝')>=0:a.loc.indexOf('参')>=0});
}

function switchPage(page){
  currentPage=page;
  document.querySelectorAll('.sm-item').forEach(function(el){el.classList.remove('active')});
  var nav=document.querySelector('[data-page="'+page+'"]');
  if(nav) nav.classList.add('active');
  if(page==='overview') renderOverview();
  else if(page==='coreview') renderCoReview();
  else if(page==='review-history') renderReviewHistory();
  else if(page==='ltv') renderLTV();
  else if(page==='alerts') renderAlerts();
  else if(page==='risk-ranking') renderRiskRanking();
  else if(page==='claims-prep') renderClaimsPrep();
  else if(page==='claims-history') renderClaimsHistory();
  else if(page==='evidence') renderEvidence();
  else if(page==='risk-report') renderRiskReport();
}

// ===== RENDER FUNCTIONS =====
function renderOverview(){
  var assets=filteredAssets();
  var totalInsured=assets.reduce(function(s,a){return s+a.insuredAmount},0);
  var warnCount=assets.filter(function(a){return a.status==='warning'}).length;
  var totalAlerts=assets.reduce(function(s,a){return s+a.alertsIn30d},0);
  mainEl.innerHTML=
    '<div class="breadcrumb">担保/保险工作台 <span>/ 概览</span></div>'+
    '<div class="page-hdr"><h2>工作台概览</h2><span style="font-size:12px;color:var(--text-muted)">机构: 吉林省农业融资担保有限公司 | 更新于 '+new Date().toLocaleString('zh-CN')+'</span></div>'+
    '<div class="stats-row">'+

function doEvidenceSearchG(){

  document.getElementById('ev-result-g').style.display='block';
  showToast('证据链查询完成：数据完整，全链路可追溯，四层证明力独立可校验','success');
}

function renderRiskReport(){
  var assets=filteredAssets();
  var totalVal=assets.reduce(function(s,a){return s+a.value},0);
  var totalInsured=assets.reduce(function(s,a){return s+a.insuredAmount},0);
  mainEl.innerHTML=
    '<div class="breadcrumb">工具 <span>/ 风险评估报告</span></div>'+
    '<div class="page-hdr"><h2>担保组合风险评估报告</h2><span style="font-size:12px;color:var(--text-muted)">生成日期: '+new Date().toLocaleDateString('zh-CN')+' | 机构: 吉林省农业融资担保有限公司</span></div>'+
    '<div class="stats-row">'+
      '<div class="stat-card"><div class="st-label">在保资产组合</div><div class="st-val">'+assets.length+'<span style="font-size:14px;color:var(--text-secondary)"> 笔</span></div><div class="st-sub">评估总价值 ¥'+totalVal.toLocaleString()+'万</div></div>'+
      '<div class="stat-card"><div class="st-label">担保总敞口</div><div class="st-val">¥'+totalInsured.toLocaleString()+'<span style="font-size:14px;color:var(--text-secondary)"> 万</span></div><div class="st-sub">平均LTV: '+(assets.length?(assets.reduce(function(s,a){return s+a.ltv},0)/assets.length).toFixed(1):'--')+'%</div></div>'+
      '<div class="stat-card"><div class="st-label">担保覆盖率</div><div class="st-val">'+(totalVal>0?(totalInsured/totalVal*100).toFixed(1):'--')+'<span style="font-size:14px;color:var(--text-secondary)">%</span></div><div class="st-sub st-up">在安全区间内</div></div>'+
      '<div class="stat-card"><div class="st-label">补偿金覆盖率</div><div class="st-val">'+(assets.filter(function(a){return a.compensationFund.indexOf('✅')>=0}).length)+'/'+assets.length+'</div><div class="st-sub">省级3000万风险补偿金</div></div>'+
    '</div>'+
    '<div class="card"><div class="card-hdr">组合风险分析</div>'+
      '<div class="card-body" style="font-size:13px;line-height:2">'+
        '<div><strong>1. 集中度风险:</strong> '+(function(){var banks={};assets.forEach(function(a){banks[a.bank]=banks[a.bank]||[];banks[a.bank].push(a)});return Object.keys(banks).map(function(b){return b+':'+banks[b].length+'笔(¥'+banks[b].reduce(function(s,a){return s+a.insuredAmount},0)+'万)'}).join(' | ');})()+'</div>'+
        '<div><strong>2. LTV分布:</strong> 绿色(<60%): '+assets.filter(function(a){return a.ltv<60}).length+'笔 | 黄色(60-65%): '+assets.filter(function(a){return a.ltv>=60&&a.ltv<65}).length+'笔 | 红色(≥65%): '+assets.filter(function(a){return a.ltv>=65}).length+'笔</div>'+
        '<div><strong>3. 区域分布:</strong> '+['通化','白山','延边'].map(function(r){var rAssets=assets.filter(function(a){return a.region===r});return r+':'+rAssets.length+'笔(¥'+rAssets.reduce(function(s,a){return s+a.insuredAmount},0)+'万)';}).join(' | ')+'</div>'+
        '<div><strong>4. 品类构成:</strong> 林下参: '+assets.filter(function(a){return a.cat==='ginseng'}).length+'笔 | 桑黄/灵芝: '+assets.filter(function(a){return a.cat==='fungi'}).length+'笔</div>'+
        '<div><strong>5. 告警统计(30天):</strong> 红'+assets.filter(function(a){return a.alertsIn30d>=2}).length+'/橙'+assets.filter(function(a){return a.alertsIn30d===1}).length+'/无'+assets.filter(function(a){return a.alertsIn30d===0}).length+'笔</div>'+
        '<div style="margin-top:12px;padding:12px;background:#f0faf5;border-radius:4px;font-size:12px;color:var(--success)"><strong>综合评估结论:</strong> 担保组合整体风险可控。'+assets.filter(function(a){return a.ltv>a.ltvLimit}).length+'笔资产LTV超出上限需立即处置，其余资产均在正常区间。建议对LTV超过上限的资产启动前置处置流程，并在下季度审查中适当降低高风险品类集中度。</div>'+
      '</div>'+
    '</div>'+
    '<div style="text-align:right"><button class="btn btn-primary" onclick="showToast(\'风险评估报告已生成\n\n报告编号: RR-'+new Date().toISOString().slice(0,10).replace(/-/g,\'\')+'-G001\n生成时间: '+new Date().toLocaleString(\'zh-CN\')+'\n\n报告已自动推送:\n✓ 担保机构风控部\n✓ 合作银行风险管理部\n✓ 地方金融监管局(聚合版)\n\n上链哈希: 0x'+Array.from({length:16},function(){return Math.floor(Math.random()*16).toString(16)}).join('')+'\',\'success\')">📋 导出完整报告</button></div>';
}

var toastTimer;
function showToast(msg,type){
  var el=document.getElementById('toast');if(!el) return;
  el.textContent=msg;el.className=type||'';
  el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove('show')},4000);
}

try {
  if(typeof $S==='undefined') throw new Error('shared-data.js 未能加载，请刷新页面重试');
  renderOverview();
} catch(e) {
  if(mainEl) mainEl.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px"><div style="font-size:18px;font-weight:600;color:var(--danger)">初始化失败</div><div style="font-size:13px;color:var(--text-secondary);text-align:center;line-height:1.8">'+String(e.message).replace(/</g,'&lt;')+'<br><br><a href="javascript:location.reload()" style="color:var(--primary)">刷新页面</a></div></div>';
}
