<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政府监管工作台 — 长白山金融化平台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root{
  --bg:#f0f2f5;--bg-white:#fff;--bg-hover:#f7f8fa;--bg-active:#e8f0fe;
  --primary:#1a6fff;--primary-light:#e8f0fe;--primary-dark:#1557cc;
  --success:#00a870;--warn:#ed7b2f;--danger:#e34d59;
  --text:#1f2937;--text-secondary:#6b7280;--text-muted:#9ca3af;
  --border:#e5e7eb;--border-light:#f0f1f3;
  --font:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;
  --radius:4px;--shadow:0 1px 3px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden;width:100vw;height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
#topnav{height:48px;background:var(--bg-white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:0;box-shadow:var(--shadow);position:relative;z-index:100}
#topnav .sys-name{font-size:15px;font-weight:600;color:var(--text);margin-right:24px;white-space:nowrap}
#topnav .sys-name .ver{font-size:11px;color:var(--text-muted);font-weight:400;margin-left:6px}
#topnav .tn-item{padding:0 16px;height:48px;line-height:48px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
#topnav .tn-item:hover{color:var(--text)}
#topnav .tn-item.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500}
#topnav .tn-right{margin-left:auto;display:flex;align-items:center;gap:16px}
#topnav .tn-badge{position:relative;cursor:pointer;padding:4px 8px;border-radius:var(--radius);font-size:12px;color:var(--text-secondary)}
#topnav .tn-badge:hover{background:var(--bg-hover)}
#topnav .tn-user{font-size:13px;color:var(--text);cursor:pointer;padding:4px 8px;border-radius:var(--radius)}
#topnav .tn-user:hover{background:var(--bg-hover)}
#layout{display:flex;height:calc(100vh - 48px)}
#sidebar{width:210px;background:var(--bg-white);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:8px 0;flex-shrink:0;overflow-y:auto}
.sm-group{padding:4px 0}
.sm-group-title{padding:8px 20px 4px;font-size:11px;color:var(--text-muted);font-weight:500}
.sm-item{display:flex;align-items:center;gap:10px;padding:9px 20px;margin:1px 8px;border-radius:var(--radius);cursor:pointer;color:var(--text-secondary);font-size:13px;transition:all .12s;white-space:nowrap}
.sm-item:hover{background:var(--bg-hover);color:var(--text)}
.sm-item.active{background:var(--primary-light);color:var(--primary);font-weight:500}
.sm-item .sm-badge{margin-left:auto;font-size:11px;background:var(--success);color:#fff;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
#main{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.page-hdr{display:flex;align-items:center;justify-content:space-between}
.page-hdr h2{font-size:18px;font-weight:600}
.breadcrumb{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:14px}
.card-body{padding:16px}.card-body.nopad{padding:0}
.stats-row{display:flex;gap:12px}
.stat-card{flex:1;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.stat-card .st-label{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.stat-card .st-val{font-size:24px;font-weight:700}
.stat-card .st-sub{font-size:11px;color:var(--text-secondary);margin-top:4px}
.st-up{color:var(--success)}.st-down{color:var(--danger)}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:10px 12px;background:#fafbfc;border-bottom:1px solid var(--border);font-weight:500;color:var(--text-secondary);font-size:12px;white-space:nowrap}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border-light)}
.data-table tr:hover td{background:var(--bg-hover)}
.tag{padding:2px 8px;border-radius:2px;font-size:11px;font-weight:500;display:inline-block}
.tag-blue{background:#e8f0fe;color:#1a6fff}.tag-green{background:#e6f7f0;color:#00a870}.tag-orange{background:#fef3e6;color:#ed7b2f}.tag-red{background:#fde8ea;color:#e34d59}.tag-gray{background:#f0f1f3;color:#6b7280}
.btn{padding:7px 16px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:1px solid transparent;font-family:var(--font);transition:all .12s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:var(--bg-white);color:var(--primary);border-color:var(--primary)}
.btn-outline:hover{background:var(--primary-light)}
.btn-default{background:var(--bg-white);color:var(--text);border-color:var(--border)}
.btn-default:hover{background:var(--bg-hover)}
.btn-sm{padding:4px 10px;font-size:12px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.form-input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);color:var(--text)}
.form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 24px;border-radius:var(--radius);font-size:13px;z-index:2000;opacity:0;transition:opacity .25s;pointer-events:none;white-space:pre-line}
#toast.show{opacity:1}
#toast.success{background:var(--success)}
.heatmap-cell{display:inline-block;width:32px;height:24px;border-radius:2px;margin:1px;position:relative;cursor:pointer}
.heatmap-cell:hover{outline:2px solid var(--primary);z-index:1}
.attr-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-light);font-size:13px}
.attr-row .attr-name{color:var(--text-secondary);min-width:140px}
.attr-row .attr-val{font-weight:600;text-align:right}
</style>
</head>
<body>

<div id="topnav">
  <span class="sys-name">长白山金融化平台<span class="ver">v1.0  ·  政府监管端</span></span>
  <span class="tn-item active">产业监管</span>
  <span class="tn-item" onclick="location.href='林企参农-工作台.html'">资产持有方</span>
  <span class="tn-item" onclick="location.href='银行-工作台.html'">银行端</span>
  <span class="tn-item" onclick="location.href='评估师-工作台.html'">评估师端</span>
  <span class="tn-item" onclick="location.href='担保保险-工作台.html'">担保/保险端</span>
  <span class="tn-right">
    <span class="tn-user">吉林省地方金融监管局 · 林业产业处 &#9662;</span>
  </span>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="sm-group">
      <div class="sm-item active" onclick="switchPage('overview')" data-page="overview">📊 产业监管大盘</div>
    </div>
    <div class="sm-group">
      <div class="sm-group-title">资产统计（聚合数据）</div>
      <div class="sm-item" onclick="switchPage('pledged')" data-page="pledged">在押资产总览</div>
      <div class="sm-item" onclick="switchPage('category')" data-page="category">品类分布分析</div>
    </div>
    <div class="sm-group">
      <div class="sm-group-title">信贷投放监测</div>
      <div class="sm-item" onclick="switchPage('credit')" data-page="credit">信贷投放分析</div>
      <div class="sm-item" onclick="switchPage('regional')" data-page="regional">区域分布</div>
    </div>
    <div class="sm-group">
      <div class="sm-group-title">风险管理</div>
      <div class="sm-item" onclick="switchPage('risk')" data-page="risk">风险分布热力图</div>
      <div class="sm-item" onclick="switchPage('compensation')" data-page="compensation">补偿金准入监管</div>
    </div>
    <div class="sm-group">
      <div class="sm-group-title">报告</div>
      <div class="sm-item" onclick="switchPage('reports')" data-page="reports">产业报告</div>
      <div class="sm-item" onclick="switchPage('stats')" data-page="stats">统计报表</div>
    </div>
  </div>
  <div id="main"></div>
</div>
<div id="toast"></div>

<script src="shared-data.js"></script>
<script>
var currentPage='overview';
var mainEl=document.getElementById('main');

// Loading state — ensures page is never truly blank
mainEl.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:14px">正在加载监管工作台...</div>';

// Global error handler — surfaces JS errors visibly
window.onerror=function(msg,url,line,col,err){
  if(mainEl) mainEl.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px"><div style="font-size:18px;font-weight:600;color:var(--danger)">页面加载异常</div><div style="font-size:13px;color:var(--text-secondary);max-width:500px;text-align:center;line-height:1.8">错误: '+String(msg).replace(/&/g,'&amp;').replace(/</g,'&lt;')+'<br>位置: 第'+line+'行<br><br>请尝试 <a href="javascript:location.reload()" style="color:var(--primary)">刷新页面</a> 或打开浏览器控制台 (F12) 查看详情</div></div>';
  return false;
};

// ===== AGGREGATED GOV DATA (no individual exposure) =====
var regionData = {
  ginseng: {
    tonghua: {assets:28, volume:8740, avgAge:10.2, avgLTV:54.3, creditDeploy:4520, alerts30d:5, compensationOk:26},
    baishan: {assets:12, volume:3950, avgAge:8.5, avgLTV:52.1, creditDeploy:2180, alerts30d:2, compensationOk:12},
    yanbian: {assets:8, volume:2820, avgAge:11.8, avgLTV:56.7, creditDeploy:1560, alerts30d:3, compensationOk:7},
  },
  fungi: {
    tonghua: {assets:22, volume:6860, avgBatchDays:175, avgLTV:52.8, creditDeploy:3890, alerts30d:8, compensationOk:20},
    baishan: {assets:6, volume:1850, avgBatchDays:155, avgLTV:50.5, creditDeploy:1080, alerts30d:1, compensationOk:6},
    yanbian: {assets:10, volume:3120, avgBatchDays:168, avgLTV:54.2, creditDeploy:1710, alerts30d:4, compensationOk:9},
  }
};

function getCatData(){
  var cat=$S.category==='fungi'?'fungi':'ginseng';
  return {key:cat, regions:regionData[cat]};
}

function getAggregated(){
  var d=getCatData();var r=d.regions;
  var total={assets:0,volume:0,creditDeploy:0,alerts30d:0,compensationOk:0,avgLTV:0};
  Object.keys(r).forEach(function(k){total.assets+=r[k].assets;total.volume+=r[k].volume;total.creditDeploy+=r[k].creditDeploy;total.alerts30d+=r[k].alerts30d;total.compensationOk+=r[k].compensationOk});
  total.avgLTV=total.assets?((Object.keys(r).reduce(function(s,k){return s+r[k].avgLTV*r[k].assets},0))/total.assets).toFixed(1):0;
  return total;
}

function switchPage(page){
  currentPage=page;
  document.querySelectorAll('.sm-item').forEach(function(el){el.classList.remove('active')});
  var nav=document.querySelector('[data-page="'+page+'"]');
  if(nav) nav.classList.add('active');
  var renderers={
    overview:renderOverview,pledged:renderPledged,category:renderCategory,
    credit:renderCredit,regional:renderRegional,risk:renderRisk,
    compensation:renderCompensation,reports:renderReports,stats:renderStats
  };
  if(renderers[page]) renderers[page]();
}

// ===== RENDER FUNCTIONS =====
function renderOverview(){
  var cat=$S.category;var d=getCatData();var r=d.regions;
  var tot=getAggregated();
  var allRegionTotal={ginseng:0,fungi:0};
  ['ginseng','fungi'].forEach(function(c){Object.keys(regionData[c]).forEach(function(k){allRegionTotal[c]+=regionData[c][k].assets})});
  mainEl.innerHTML=
    '<div class="breadcrumb">政府监管 <span>/ 产业监管大盘</span></div>'+
    '<div class="page-hdr"><h2>长白山林下经济金融化 · 产业监管大盘</h2><span style="font-size:12px;color:var(--text-muted)">数据聚合展示 · 不暴露个户信息 | 更新于 '+new Date().toLocaleString('zh-CN')+'</span></div>'+
    '<div class="stats-row">'+
      '<div class="stat-card"><div class="st-label">在押资产总量</div><div class="st-val">¥'+(tot.volume/10000).toFixed(2)+'<span style="font-size:14px;color:var(--text-secondary)"> 亿</span></div><div class="st-sub">'+tot.assets+'笔 · 含'+Object.keys(r).length+'个区县</div></div>'+
      '<div class="stat-card"><div class="st-label">信贷投放总额</div><div class="st-val">¥'+(tot.creditDeploy/10000).toFixed(2)+'<span style="font-size:14px;color:var(--text-secondary)"> 亿</span></div><div class="st-sub st-up">季度环比+11.2%</div></div>'+
      '<div class="stat-card"><div class="st-label">平均押品LTV</div><div class="st-val">'+tot.avgLTV+'<span style="font-size:14px;color:var(--text-secondary)">%</span></div><div class="st-sub" style="color:'+(tot.avgLTV<60?'var(--success)':'var(--warn)')+'">整体风险可控</div></div>'+
      '<div class="stat-card"><div class="st-label">补偿金覆盖</div><div class="st-val">'+tot.compensationOk+'/'+tot.assets+'<span style="font-size:14px;color:var(--text-secondary)"> 笔</span></div><div class="st-sub">覆盖率 '+(tot.assets?(tot.compensationOk/tot.assets*100).toFixed(0):0)+'%</div></div>'+
    '</div>'+
    // Chart row
    '<div style="display:flex;gap:12px">'+
      '<div class="card" style="flex:2"><div class="card-hdr">月度信贷投放趋势（全品类）</div><div class="card-body"><div id="credit-trend-chart" style="width:100%;height:240px"></div></div></div>'+
      '<div class="card" style="flex:1"><div class="card-hdr">品类分布</div><div class="card-body"><div id="category-pie" style="width:100%;height:240px"></div></div></div>'+
    '</div>'+
    // Region summary
    '<div class="card"><div class="card-hdr">各区县概览 —— '+($S.category==='fungi'?'桑黄/灵芝':'林下参')+'</div>'+
      '<div class="card-body nopad">'+
        '<table class="data-table"><thead><tr><th>区县</th><th>在押资产(笔)</th><th>评估总量(万元)</th><th>信贷投放(万元)</th><th>平均LTV(%)</th><th>'+($S.category==='fungi'?'平均批龄(天)':'平均参龄(年)')+'</th><th>30天告警</th><th>补偿金覆盖</th></tr></thead>'+
          '<tbody>'+Object.keys(r).map(function(k){return '<tr>'+
            '<td style="font-weight:600">'+({'tonghua':'通化市','baishan':'白山市','yanbian':'延边州'}[k])+'</td>'+
            '<td>'+r[k].assets+'</td>'+
            '<td>¥'+r[k].volume.toLocaleString()+'</td>'+
            '<td style="font-weight:600;color:var(--primary)">¥'+r[k].creditDeploy.toLocaleString()+'</td>'+
            '<td>'+r[k].avgLTV.toFixed(1)+'%</td>'+
            '<td>'+($S.category==='fungi'?r[k].avgBatchDays:r[k].avgAge)+'</td>'+
            '<td>'+r[k].alerts30d+'次</td>'+
            '<td>'+r[k].compensationOk+'/'+r[k].assets+'</td>'+
          '</tr>';}).join('')+'</tbody></table>'+
    '</div></div>'+
    '<div style="padding:10px 14px;background:#f0f4f8;border-radius:4px;font-size:11px;color:var(--text-muted)">注: 本页面所有数据均为聚合统计，依法不暴露个户资产信息和具体信贷条款。全品类数据含林下参与桑黄/灵芝两大品类，可通过顶部切换查看单品类明细。</div>';
  setTimeout(function(){
    var el1=document.getElementById('credit-trend-chart');
    if(el1&&!el1._c){
      el1._c=echarts.init(el1);
      el1._c.setOption({
        grid:{left:50,right:10,top:10,bottom:20},
        xAxis:{type:'category',data:['1月','2月','3月','4月','5月'],axisLabel:{fontSize:10}},
        yAxis:{type:'value',name:'万元',axisLabel:{fontSize:10},splitLine:{lineStyle:{type:'dashed',color:'#e5e7eb'}}},
        series:[
          {name:'林下参',type:'bar',data:[6200,6450,6810,7200,8260],barWidth:16,itemStyle:{color:'#4A7FB5'},emphasis:{itemStyle:{color:'#3a6a9f'}}},
          {name:'桑黄/灵芝',type:'bar',data:[3800,4120,4480,4950,6680],barWidth:16,itemStyle:{color:'#5B9A8B'},emphasis:{itemStyle:{color:'#4a8a7b'}}},
        ],
        legend:{bottom:0,textStyle:{fontSize:9},itemWidth:12,itemHeight:12},tooltip:{trigger:'axis'}
      });
    }
    var el2=document.getElementById('category-pie');
    if(el2&&!el2._c){
      el2._c=echarts.init(el2);
      el2._c.setOption({
        grid:{left:0,right:0,top:0,bottom:0},
        series:[{type:'pie',radius:['45%','70%'],center:['50%','50%'],
          label:{formatter:'{b}\n{d}%',fontSize:10},
          data:[
            {value:allRegionTotal.ginseng,name:'林下参',itemStyle:{color:'#4A7FB5'}},
            {value:allRegionTotal.fungi,name:'桑黄/灵芝',itemStyle:{color:'#5B9A8B'}},
          ],
          emphasis:{label:{fontSize:14,fontWeight:'bold'}}
        }],
        tooltip:{trigger:'item',formatter:'{b}: {c}笔 ({d}%)'}
      });
    }
  },200);
}

function renderPledged(){
  var d=getCatData();var r=d.regions;
  var tot=getAggregated();
  mainEl.innerHTML=
    '<div class="breadcrumb">资产统计 <span>/ 在押资产总览</span></div>'+
    '<div class="page-hdr"><h2>在押资产总览 —— '+($S.category==='fungi'?'桑黄/灵芝':'林下参')+'</h2><span style="font-size:12px;color:var(--text-muted)">聚合统计 · 不暴露个户</span></div>'+
    '<div class="stats-row">'+
      '<div class="stat-card"><div class="st-label">在押资产笔数</div><div class="st-val">'+tot.assets+'<span style="font-size:14px;color:var(--text-secondary)"> 笔</span></div><div class="st-sub">覆盖'+Object.keys(r).length+'个区县</div></div>'+
      '<div class="stat-card"><div class="st-label">评估总价值</div><div class="st-val">¥'+tot.volume.toLocaleString()+'<span style="font-size:14px;color:var(--text-secondary)"> 万</span></div><div class="st-sub">'+($S.category==='fungi'?'批量标准估值':'DCF动态估值')+'</div></div>'+
      '<div class="stat-card"><div class="st-label">信贷投放</div><div class="st-val">¥'+tot.creditDeploy.toLocaleString()+'<span style="font-size:14px;color:var(--text-secondary)"> 万</span></div><div class="st-sub">平均LTV: '+tot.avgLTV+'%</div></div>'+
      '<div class="stat-card"><div class="st-label">'+($S.category==='fungi'?'平均批龄':'平均参龄')+'</div><div class="st-val">'+($S.category==='fungi'?(Object.keys(r).reduce(function(s,k){return s+r[k].avgBatchDays*r[k].assets},0)/tot.assets).toFixed(0):(Object.keys(r).reduce(function(s,k){return s+r[k].avgAge*r[k].assets},0)/tot.assets).toFixed(1))+'<span style="font-size:14px;color:var(--text-secondary)"> '+($S.category==='fungi'?'天':'年')+'</span></div><div class="st-sub">'+($S.category==='fungi'?'完整培育周期':'生长周期')+'</div></div>'+
    '</div>'+
    '<div class="card"><div class="card-hdr">按区县分布</div><div class="card-body"><div id="region-bar" style="width:100%;height:260px"></div></div></div>';
  setTimeout(function(){
    var el=document.getElementById('region-bar');
    if(el&&!el._c){
      var regions=['通化市','白山市','延边州'];
      el._c=echarts.init(el);
      el._c.setOption({
        grid:{left:55,right:10,top:10,bottom:20},
        xAxis:{type:'category',data:regions,axisLabel:{fontSize:11}},
        yAxis:{type:'value',name:'万元',axisLabel:{fontSize:10},splitLine:{lineStyle:{type:'dashed',color:'#e5e7eb'}}},
        series:[
          {name:'评估价值',type:'bar',data:[r.tonghua.volume,r.baishan.volume,r.yanbian.volume],barWidth:24,itemStyle:{color:'#4A7FB5',opacity:0.7},label:{show:true,position:'top',fontSize:10,formatter:function(p){return '¥'+(p.value/10000).toFixed(1)+'亿'}}},

var toastTimer;
function showToast(msg,type){
  var el=document.getElementById('toast');if(!el) return;
  el.textContent=msg;el.className=type||'';
  el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove('show')},4000);
}
