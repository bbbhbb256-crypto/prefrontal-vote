<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>评估师工作台 — 长白山金融化平台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root{
  --bg:#f0f2f5;--bg-white:#fff;--bg-hover:#f7f8fa;--bg-active:#e8f0fe;
  --primary:#1a6fff;--primary-light:#e8f0fe;--primary-dark:#1557cc;
  --success:#00a870;--warn:#ed7b2f;--danger:#e34d59;
  --text:#1f2937;--text-secondary:#6b7280;--text-muted:#9ca3af;
  --border:#e5e7eb;--border-light:#f0f1f3;
  --font:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;
  --radius:4px;--shadow:0 1px 3px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden;width:100vw;height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
#topnav{height:48px;background:var(--bg-white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:0;box-shadow:var(--shadow);position:relative;z-index:100}
#topnav .sys-name{font-size:15px;font-weight:600;color:var(--text);margin-right:24px;white-space:nowrap}
#topnav .sys-name .ver{font-size:11px;color:var(--text-muted);font-weight:400;margin-left:6px}
#topnav .tn-item{padding:0 16px;height:48px;line-height:48px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
#topnav .tn-item:hover{color:var(--text)}
#topnav .tn-item.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500}
#topnav .tn-right{margin-left:auto;display:flex;align-items:center;gap:16px}
#topnav .tn-badge{position:relative;cursor:pointer;padding:4px 8px;border-radius:var(--radius);font-size:12px;color:var(--text-secondary)}
#topnav .tn-badge:hover{background:var(--bg-hover)}
#topnav .tn-badge .cnt{background:var(--danger);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:4px}
#topnav .tn-user{font-size:13px;color:var(--text);cursor:pointer;padding:4px 8px;border-radius:var(--radius)}
#topnav .tn-user:hover{background:var(--bg-hover)}
#layout{display:flex;height:calc(100vh - 48px)}
#sidebar{width:200px;background:var(--bg-white);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:8px 0;flex-shrink:0;overflow-y:auto}
.sm-group{padding:4px 0}
.sm-group-title{padding:8px 20px 4px;font-size:11px;color:var(--text-muted);font-weight:500}
.sm-item{display:flex;align-items:center;gap:10px;padding:9px 20px;margin:1px 8px;border-radius:var(--radius);cursor:pointer;color:var(--text-secondary);font-size:13px;transition:all .12s;white-space:nowrap}
.sm-item:hover{background:var(--bg-hover);color:var(--text)}
.sm-item.active{background:var(--primary-light);color:var(--primary);font-weight:500}
.sm-item .sm-badge{margin-left:auto;font-size:11px;background:var(--danger);color:#fff;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
#main{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.page-hdr{display:flex;align-items:center;justify-content:space-between}
.page-hdr h2{font-size:18px;font-weight:600}
.breadcrumb{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:14px}
.card-body{padding:16px}.card-body.nopad{padding:0}
.stats-row{display:flex;gap:12px}
.stat-card{flex:1;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.stat-card .st-label{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.stat-card .st-val{font-size:24px;font-weight:700}
.stat-card .st-sub{font-size:11px;color:var(--text-secondary);margin-top:4px}
.st-up{color:var(--success)}.st-down{color:var(--danger)}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:10px 12px;background:#fafbfc;border-bottom:1px solid var(--border);font-weight:500;color:var(--text-secondary);font-size:12px;white-space:nowrap}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border-light)}
.data-table tr:hover td{background:var(--bg-hover);cursor:pointer}
.tag{padding:2px 8px;border-radius:2px;font-size:11px;font-weight:500;display:inline-block}
.tag-blue{background:#e8f0fe;color:#1a6fff}.tag-green{background:#e6f7f0;color:#00a870}.tag-orange{background:#fef3e6;color:#ed7b2f}.tag-red{background:#fde8ea;color:#e34d59}.tag-gray{background:#f0f1f3;color:#6b7280}
.btn{padding:7px 16px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:1px solid transparent;font-family:var(--font);transition:all .12s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:var(--bg-white);color:var(--primary);border-color:var(--primary)}
.btn-outline:hover{background:var(--primary-light)}
.btn-default{background:var(--bg-white);color:var(--text);border-color:var(--border)}
.btn-default:hover{background:var(--bg-hover)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.form-input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);color:var(--text)}
.form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
.form-input:disabled{background:#f5f6f8;color:var(--text-muted)}
.form-row{display:flex;gap:12px}
.form-row>*{flex:1}
.cat-switch{display:inline-flex;background:var(--bg);border-radius:4px;padding:2px;gap:0}
.cat-switch .cat-pill{padding:5px 14px;border-radius:3px;cursor:pointer;font-size:12px;color:var(--text-secondary);transition:all .15s;white-space:nowrap;border:none;background:transparent;font-family:var(--font)}
.cat-switch .cat-pill:hover{color:var(--text)}
.cat-switch .cat-pill.active{background:var(--bg-white);color:var(--primary);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,0.08)}
.form-check{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;padding:4px 0}
.param-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light)}
.param-row .p-name{color:var(--text-secondary);font-size:13px;min-width:120px}
.param-row .p-ai{font-family:monospace;font-size:14px;font-weight:600;min-width:80px;text-align:right}
.param-row .p-edit{min-width:120px;margin:0 12px}
.param-row .p-status{min-width:80px;text-align:right;font-size:12px}
.param-row .p-status.confirmed{color:var(--success)}.param-row .p-status.pending{color:var(--warn)}
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 24px;border-radius:var(--radius);font-size:13px;z-index:2000;opacity:0;transition:opacity .25s;pointer-events:none;white-space:pre-line}
#toast.show{opacity:1}
#toast.success{background:var(--success)}
#toast.error{background:var(--danger)}
.evidence-node{display:flex;align-items:center;gap:8px;padding:10px 0;position:relative}
.evidence-node .en-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--primary);background:var(--bg-white);flex-shrink:0;z-index:1}
.evidence-node .en-dot.filled{background:var(--primary)}
.evidence-node .en-line{position:absolute;left:6px;top:24px;width:2px;height:calc(100% - 10px);background:var(--border)}
.evidence-node:last-child .en-line{display:none}
.evidence-node .en-content{font-size:12px;line-height:1.6}
.evidence-node .en-content .en-title{font-weight:500}
.evidence-node .en-content .en-meta{color:var(--text-muted);font-size:11px}
.evidence-node .en-content{cursor:default}
.ev-detail{display:none;margin-top:6px;padding:8px 10px;background:#fafbfc;border-radius:3px;font-size:11px;line-height:1.7;border-left:3px solid var(--primary)}
.ev-detail.open{display:block}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-mask.open{display:flex}
.modal-box{background:var(--bg-white);border-radius:6px;width:700px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.15)}
.modal-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:15px}
.modal-body{padding:20px}
.modal-ftr{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.modal-close{cursor:pointer;font-size:20px;color:var(--text-muted);padding:0 4px}
.modal-close:hover{color:var(--text)}
.compare-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.compare-table th{background:#fafbfc;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);font-weight:500;color:var(--text-secondary);font-size:11px}
.compare-table td{padding:8px 10px;border-bottom:1px solid var(--border-light);font-family:monospace;font-size:12px}
.compare-table .match{color:var(--success)}.compare-table .warn{color:var(--warn)}.compare-table .diff{color:var(--danger)}
.ev-node-clickable{cursor:pointer;transition:background .12s}
.ev-node-clickable:hover{background:#fafbfc;border-radius:3px;padding:4px 6px;margin:-4px -6px}
</style>
</head>
<body>

<div id="topnav">
  <span class="sys-name">长白山金融化平台<span class="ver">v1.0  ·  评估师端</span></span>
  <span class="tn-item active">估值工作台</span>
  <span class="tn-item" onclick="location.href='林企参农-工作台.html'">资产持有方</span>
  <span class="tn-item" onclick="location.href='银行-工作台.html'">银行端</span>
  <span class="tn-item" onclick="location.href='政府监管-工作台.html'">政府监管端</span>
  <span class="tn-item" onclick="location.href='担保保险-工作台.html'">担保/保险端</span>
  <span class="tn-right">
    <div class="cat-switch" style="margin-right:8px">
      <button class="cat-pill active" id="acat-ginseng" onclick="switchCategoryUI('ginseng')">🌿 林下参</button>
      <button class="cat-pill" id="acat-fungi" onclick="switchCategoryUI('fungi')">🍄 桑黄/灵芝</button>
    </div>
    <span class="tn-badge">消息<span class="cnt">2</span></span>
    <span class="tn-user">张xx评估师 · 吉评字[2026]018号 &#9662;</span>
  </span>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="sm-group">
      <div class="sm-item active" onclick="switchPage('overview')" data-page="overview">工作台概览</div>
    </div>
    <div class="sm-group">
      <div class="sm-group-title">估值任务</div>
      <div class="sm-item" onclick="switchPage('tasks')" data-page="tasks">待处理任务<span class="sm-badge">3</span></div>
      <div class="sm-item" onclick="switchPage('history')" data-page="history">历史报告</div>
    </div>
    <div class="sm-group">
      <div class="sm-group-title">工具</div>
      <div class="sm-item" onclick="switchPage('draft')" data-page="draft">底稿生成器</div>
	      <div class="sm-item" onclick="switchPage('evidence')" data-page="evidence">证据链浏览器</div>
      <div class="sm-item" onclick="switchPage('hsidata')" data-page="hsidata">遥感巡检数据</div>
    </div>
  </div>
  <div id="main"></div>
</div>
<div id="toast"></div>

<script src="shared-data.js"></script>
<script>
let currentPage='overview';
const mainEl=document.getElementById('main');

// 接收其他标签页的状态同步
function onStateSync(state){
  if(currentPage==='overview') renderOverview();
  else if(currentPage==='tasks') renderTasks();
  else if(currentPage==='history') renderHistory();
}
function onCategorySwitch(cat){
  document.getElementById('acat-ginseng').classList.toggle('active',cat==='ginseng');
  document.getElementById('acat-fungi').classList.toggle('active',cat==='fungi');
}
function switchCategoryUI(cat){
  switchCategory(cat);
  onCategorySwitch(cat);
  switchPage(currentPage);
}
function filteredTasks(){
  return tasks.filter(function(t){return t.cat===($S.category==='fungi'?'fungi':'ginseng')});
}
function filteredHistory(){
  return historyReports.filter(function(r){return r.cat===($S.category==='fungi'?'fungi':'ginseng')});
}

const tasks=[
  {cat:'ginseng',id:'VAL-2026-0518',asset:'A地块·12年参龄',type:'林下参',applicant:'长白山参业有限公司',svAi:88.5,qa:42,qb:35,qc:18,priceAi:5800,dueDate:'2026-05-22',status:'pending'},
  {cat:'ginseng',id:'VAL-2026-0515',asset:'B地块·8年参龄',type:'林下参',applicant:'长白山参业有限公司',svAi:72.3,qa:35,qb:40,qc:22,priceAi:5200,dueDate:'2026-05-20',status:'pending'},
  {cat:'fungi',id:'VAL-2026-0510',asset:'大棚1号·桑黄批次7',type:'桑黄',applicant:'通化参业合作社',svAi:92.0,qa:55,qb:30,qc:12,priceAi:3200,dueDate:'2026-05-15',status:'review'},
  {cat:'fungi',id:'VAL-2026-0508',asset:'林下区块2·灵芝批次3',type:'灵芝',applicant:'灵芝堂种植基地',svAi:94.0,qa:48,qb:35,qc:15,priceAi:3500,dueDate:'2026-05-25',status:'pending'},
  {cat:'fungi',id:'VAL-2026-0505',asset:'大棚3号·桑黄批次10',type:'桑黄',applicant:'通化参业合作社',svAi:89.5,qa:52,qb:32,qc:14,priceAi:3100,dueDate:'2026-05-20',status:'pending'},
];

const historyReports=[
  {cat:'ginseng',id:'VAL-2026-0408',asset:'D地块·10年参龄',date:'2026-04-08',svFinal:85.0,priceFinal:6000,status:'已签章'},
  {cat:'ginseng',id:'VAL-2026-0315',asset:'E地块·7年参龄',date:'2026-03-15',svFinal:78.5,priceFinal:5500,status:'已签章'},
  {cat:'ginseng',id:'VAL-2026-0201',asset:'H地块·15年参龄',date:'2026-02-01',svFinal:93.2,priceFinal:6800,status:'已签章'},
  {cat:'fungi',id:'VAL-2026-0320',asset:'大棚2号·灵芝批次5',date:'2026-03-20',svFinal:86.0,priceFinal:3300,status:'已签章'},
  {cat:'fungi',id:'VAL-2026-0228',asset:'桑黄批次2',date:'2026-02-28',svFinal:81.0,priceFinal:2900,status:'已签章'},
];

function switchPage(page){
  currentPage=page;
  document.querySelectorAll('.sm-item').forEach(el=>el.classList.remove('active'));
  const nav=document.querySelector(`[data-page="${page}"]`);
  if(nav) nav.classList.add('active');
  if(page==='overview') renderOverview();
  else if(page==='tasks') renderTasks();
  else if(page.startsWith('verify-')) renderVerify(page.substring(7));
  else if(page.startsWith('hsidetail-')) renderHSIDetail(page.substring(9));
  else if(page==='history') renderHistory();
  else if(page==='evidence') renderEvidence();
  else if(page==='draft') renderDraft();
	  else if(page==='hsidata') renderHSIData();
}

function renderOverview(){
  mainEl.innerHTML=`
    <div class="breadcrumb">评估师工作台 <span>/ 概览</span></div>
    <div class="page-hdr"><h2>工作台概览</h2><span style="font-size:12px;color:var(--text-muted)">评估师: 张xx | 资质: 吉评字[2026]018号</span></div>
    <div class="stats-row">
      <div class="stat-card"><div class="st-label">待处理估值任务</div><div class="st-val">3<span style="font-size:14px;color:var(--text-secondary)"> 项</span></div><div class="st-sub st-up">1项临近截止日期</div></div>
      <div class="stat-card"><div class="st-label">本月完成估值</div><div class="st-val">12<span style="font-size:14px;color:var(--text-secondary)"> 份</span></div><div class="st-sub">较上月 +2份</div></div>
      <div class="stat-card"><div class="st-label">累计估值资产</div><div class="st-val">¥3.2<span style="font-size:14px;color:var(--text-secondary)"> 亿</span></div><div class="st-sub">47份报告 · 零争议</div></div>
      <div class="stat-card"><div class="st-label">高光谱巡检记录</div><div class="st-val">18<span style="font-size:14px;color:var(--text-secondary)"> 次</span></div><div class="st-sub">最近: 2026-05-15</div></div>
    </div>
    <div class="card"><div class="card-hdr">全流程概览 <span style="font-weight:400;font-size:11px;color:var(--text-muted)">| 绿色=已完成 蓝色=当前步骤 灰色=待完成</span></div>
      <div class="card-body">${renderFlowBar('评估师')}</div>
    </div>
    <div style="display:flex;gap:12px">
      <div class="card" style="flex:3">
        <div class="card-hdr">待处理估值任务 <a href="javascript:switchPage('tasks')" style="font-size:12px;font-weight:400">全部</a></div>
        <div class="card-body nopad">
          <table class="data-table"><thead><tr><th>任务编号</th><th>资产</th><th>类型</th><th>AI${$S.category==='fungi'?'品级率':'存活率'}<br>参考值</th><th>AI价格基准</th><th>截止日期</th><th>状态</th><th>操作</th></tr></thead>
            <tbody>${filteredTasks().map(t=>`<tr>
              <td style="color:var(--primary)">${t.id}</td><td>${t.asset}</td><td>${t.type}</td><td>${t.svAi}%</td><td>¥${t.priceAi}/kg</td>
              <td>${t.dueDate}</td><td>${t.status==='pending'?'<span class="tag tag-orange">待估值</span>':'<span class="tag tag-blue">复核中</span>'}</td>
              <td><button class="btn btn-primary btn-sm" onclick="switchPage('verify-${t.id}')">开始估值</button></td>
            </tr>`).join('')}</tbody></table>
        </div>
      </div>
      <div class="card" style="flex:2">
        <div class="card-hdr">最近完成 <a href="javascript:switchPage('history')" style="font-size:12px;font-weight:400">全部</a></div>
        <div class="card-body nopad">${filteredHistory().map(r=>`
          <div style="padding:10px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:13px" onclick="showToast('估值报告 ${r.id}\n资产: ${r.asset}\n最终存活率: ${r.svFinal}%\n价格基准: ¥${r.priceFinal}/kg\n状态: ${r.status}\n签章时间: ${r.date}T15:30:00+08:00\n上链哈希: 0x${Array.from({length:16},()=>Math.floor(Math.random()*16).toString(16)).join('')}')">
            <span style="color:var(--primary)">${r.id}</span>
            <span>${r.asset}</span>
            <span style="color:var(--text-secondary)">${r.date}</span>
            <span class="tag tag-green">${r.status}</span>
          </div>`).join('')}</div>
      </div>
    </div>`;
}

function renderTasks(){
  mainEl.innerHTML=`
    <div class="breadcrumb">估值任务 <span>/ 待处理</span></div>
    <div class="page-hdr"><h2>待处理估值任务</h2></div>
    <div class="card"><div class="card-body nopad">
      <table class="data-table"><thead><tr><th>任务编号</th><th>资产</th><th>类型</th><th>申请人</th><th>AI${$S.category==='fungi'?'品级率':'存活率'}<br>参考值</th><th>AI品质(A/B/C)</th><th>AI价格(¥/kg)</th><th>截止日期</th><th>操作</th></tr></thead>
        <tbody>${filteredTasks().map(t=>`<tr>
          <td style="color:var(--primary)">${t.id}</td><td>${t.asset}</td><td>${t.type}</td><td>${t.applicant}</td><td>${t.svAi}%</td>
          <td>${t.qa}/${t.qb}/${t.qc}%</td><td>¥${t.priceAi}</td><td style="color:${new Date(t.dueDate)<new Date()?'var(--danger)':'var(--text)'}">${t.dueDate}</td>
          <td><button class="btn btn-primary btn-sm" onclick="switchPage('verify-${t.id}')">进入估值</button></td>
        </tr>`).join('')}</tbody></table>
    </div></div>`;
}

// ===== PARAMETER VERIFICATION (core interactive workflow) =====
let currentTask=null;
let compareVisible=false;

function toggleEvDetail(n){
  const el=document.getElementById('ev-detail-'+n);
  if(el) el.classList.toggle('open');
}
